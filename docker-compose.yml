# Memship — Full-stack deployment with Caddy reverse proxy
#
# Quick start:
#   docker compose up -d
#   docker compose exec api uv run python -m app.cli.seed
#   Open http://localhost
#
# To use pre-built images from GHCR instead of building locally,
# set IMAGE_TAG in .env (e.g., IMAGE_TAG=0.1.3)

services:
  caddy:
    image: caddy:2-alpine
    container_name: memship-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-ghcr.io/marcandreuf/memship-backend:${IMAGE_TAG:-latest}}
    build:
      context: backend
      dockerfile: docker/Dockerfile
    container_name: memship-api
    expose:
      - "8000"
    ports:
      - "${API_PORT:-8003}:8000"
    environment:
      - DATABASE_URL=postgresql://memship:${DB_PASSWORD:-memship}@db:5432/memship_db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - APP_ENV=${APP_ENV:-production}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-es}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@memship.local}
      - SMTP_TLS=${SMTP_TLS:-true}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - RUN_MIGRATIONS=1
    volumes:
      - ./VERSION:/app/VERSION:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/marcandreuf/memship-frontend:${IMAGE_TAG:-latest}}
    build:
      context: frontend
      dockerfile: docker/Dockerfile
    container_name: memship-frontend
    expose:
      - "3000"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: memship-db
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=memship
      - POSTGRES_PASSWORD=${DB_PASSWORD:-memship}
      - POSTGRES_DB=memship_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "memship", "-d", "memship_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
