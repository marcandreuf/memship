# Memship Quick Start — single-file deployment using pre-built images
#
# Usage:
#   curl -fsSL https://raw.githubusercontent.com/marcandreuf/memship/main/docker-compose.quickstart.yml -o docker-compose.yml
#   PORT=8081 docker compose up -d
#   docker compose exec demo-memship-api uv run python -m app.cli.seed --test   # Quick demo with test accounts
#   docker compose exec demo-memship-api uv run python -m app.cli.seed          # Custom setup (interactive)
#   Open http://localhost:8081
#

services:
  demo-memship-caddy:
    image: caddy:2-alpine
    container_name: demo-memship-caddy
    ports:
      - "${PORT:-80}:80"
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'CADDYEOF'
        :80 {
          handle /api/v1/* {
            reverse_proxy demo-memship-api:8000
          }
          handle /uploads/* {
            reverse_proxy demo-memship-api:8000
          }
          handle {
            reverse_proxy demo-memship-frontend:3000
          }
        }
        CADDYEOF
        caddy run --config /etc/caddy/Caddyfile
    depends_on:
      - demo-memship-frontend
      - demo-memship-api
    restart: unless-stopped

  demo-memship-api:
    image: ghcr.io/marcandreuf/memship-backend:latest
    container_name: demo-memship-api
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://memship:memship@demo-memship-db:5432/memship_db
      - SECRET_KEY=change-me-in-production-use-a-random-64-char-string
      - APP_ENV=production
      - DEFAULT_LOCALE=es
      - CORS_ORIGINS=http://localhost
      - FRONTEND_URL=http://localhost
      - RUN_MIGRATIONS=1
    volumes:
      - demo-memship-storage:/app/storage
    depends_on:
      demo-memship-db:
        condition: service_healthy
    restart: unless-stopped

  demo-memship-frontend:
    image: ghcr.io/marcandreuf/memship-frontend:latest
    container_name: demo-memship-frontend
    expose:
      - "3000"
    environment:
      - API_BASE_URL=http://demo-memship-api:8000
    depends_on:
      - demo-memship-api
    restart: unless-stopped

  demo-memship-db:
    image: postgres:15-alpine
    container_name: demo-memship-db
    environment:
      - POSTGRES_USER=memship
      - POSTGRES_PASSWORD=memship
      - POSTGRES_DB=memship_db
    volumes:
      - demo-memship-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "memship", "-d", "memship_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  demo-memship-pgdata:
  demo-memship-storage:
