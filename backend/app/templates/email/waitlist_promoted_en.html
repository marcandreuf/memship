<h2>You're In!</h2>
<p>Hi {{ member_name }},</p>
<p>A spot has opened up in <strong>{{ activity_name }}</strong> and your registration has been <strong>confirmed</strong>.</p>
{% if activity_date %}<p><strong>Date:</strong> {{ activity_date }}</p>{% endif %}
{% if location %}<p><strong>Location:</strong> {{ location }}</p>{% endif %}
<p>See you there!</p>
